<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Potter's House Church - Registration</title>
    <link rel="stylesheet" href="../Home/styles.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/css/bootstrap-datepicker.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── Success Overlay ── */
      #success-overlay {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.75);
        backdrop-filter: blur(8px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s ease;
      }

      #success-overlay.show {
        opacity: 1;
        pointer-events: all;
      }

      .success-card {
        background: linear-gradient(145deg, #0f1e14, #1a3322);
        border: 1px solid rgba(134, 197, 118, 0.25);
        border-radius: 24px;
        padding: 52px 48px;
        max-width: 420px;
        width: 90%;
        text-align: center;
        position: relative;
        overflow: hidden;
        transform: translateY(30px) scale(0.95);
        transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        box-shadow:
          0 40px 80px rgba(0, 0, 0, 0.5),
          0 0 0 1px rgba(134, 197, 118, 0.1);
      }

      #success-overlay.show .success-card {
        transform: translateY(0) scale(1);
      }

      /* Glow orb behind icon */
      .success-card::before {
        content: "";
        position: absolute;
        top: -60px;
        left: 50%;
        transform: translateX(-50%);
        width: 200px;
        height: 200px;
        background: radial-gradient(
          circle,
          rgba(134, 197, 118, 0.15) 0%,
          transparent 70%
        );
        pointer-events: none;
      }

      /* Animated ring */
      .success-icon-wrap {
        position: relative;
        width: 80px;
        height: 80px;
        margin: 0 auto 28px;
      }

      .success-ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid rgba(134, 197, 118, 0.4);
        animation: ringPulse 2s ease-out infinite;
      }

      .success-ring:nth-child(2) {
        animation-delay: 0.4s;
      }
      .success-ring:nth-child(3) {
        animation-delay: 0.8s;
      }

      @keyframes ringPulse {
        0% {
          transform: scale(1);
          opacity: 0.8;
        }
        100% {
          transform: scale(2.2);
          opacity: 0;
        }
      }

      .success-icon {
        position: relative;
        z-index: 1;
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #4caf50, #86c576);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 32px rgba(76, 175, 80, 0.4);
      }

      .success-icon svg {
        width: 36px;
        height: 36px;
        stroke: white;
        fill: none;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 50;
        stroke-dashoffset: 50;
        transition: stroke-dashoffset 0.6s ease 0.3s;
      }

      #success-overlay.show .success-icon svg {
        stroke-dashoffset: 0;
      }

      .success-label {
        font-family: "Jost", sans-serif;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #86c576;
        margin-bottom: 10px;
      }

      .success-title {
        font-family: "Cormorant Garamond", serif;
        font-size: 32px;
        font-weight: 700;
        color: #f0f7ee;
        line-height: 1.2;
        margin-bottom: 14px;
      }

      .success-message {
        font-family: "Jost", sans-serif;
        font-size: 14px;
        font-weight: 300;
        color: rgba(240, 247, 238, 0.6);
        line-height: 1.7;
        margin-bottom: 36px;
      }

      /* Divider */
      .success-divider {
        width: 48px;
        height: 1px;
        background: linear-gradient(
          to right,
          transparent,
          #86c576,
          transparent
        );
        margin: 0 auto 28px;
      }

      .success-close {
        font-family: "Jost", sans-serif;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: #0f1e14;
        background: linear-gradient(135deg, #86c576, #4caf50);
        border: none;
        border-radius: 50px;
        padding: 14px 40px;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        box-shadow: 0 4px 20px rgba(76, 175, 80, 0.35);
      }

      .success-close:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 28px rgba(76, 175, 80, 0.45);
      }

      /* Floating particles */
      .particle {
        position: absolute;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: #86c576;
        opacity: 0;
      }

      #success-overlay.show .particle {
        animation: floatUp 2s ease-out forwards;
      }

      .particle:nth-child(1) {
        left: 15%;
        bottom: 20%;
        animation-delay: 0.1s;
      }
      .particle:nth-child(2) {
        left: 30%;
        bottom: 10%;
        animation-delay: 0.3s;
        width: 6px;
        height: 6px;
      }
      .particle:nth-child(3) {
        left: 60%;
        bottom: 15%;
        animation-delay: 0.2s;
      }
      .particle:nth-child(4) {
        left: 75%;
        bottom: 25%;
        animation-delay: 0.5s;
        width: 3px;
        height: 3px;
      }
      .particle:nth-child(5) {
        left: 85%;
        bottom: 10%;
        animation-delay: 0.4s;
      }

      @keyframes floatUp {
        0% {
          opacity: 0;
          transform: translateY(0);
        }
        20% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          transform: translateY(-80px);
        }
      }
    </style>
  </head>

  <body>
    <div class="preloader">
      <img class="" src="../images/PHC-logo.png" />
    </div>
    <div class="scroll__animation">
      <div class="section__two">
        <div class="top__two">
          <h1>We are Issachars</h1>
          <p>Register here to be part of us</p>
        </div>
        <div class="bottom">
          <form id="registrationForm" class="form__container">
            <div class="inputs">
              <input
                name="fullName"
                type="text"
                placeholder="Full Name"
                required
              />
              <select name="gender" class="gender__select" required>
                <option value="" disabled selected>Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
              </select>
              <select name="maritalStatus" class="gender__select" required>
                <option value="" disabled selected>Marital Status</option>
                <option value="Single">Single</option>
                <option value="Married">Married</option>
                <option value="Widow">Widow</option>
                <option value="Widower">Widower</option>
                <option value="Engaged">Engaged</option>
                <option value="In a relationship">In a Relationship</option>
              </select>
              <textarea
                name="address"
                id="textArea"
                required
                placeholder="Residential Address"
              ></textarea>
              <input
                name="occupation"
                type="text"
                placeholder="Occupation"
                required
              />
              <input
                name="phoneNumber"
                type="number"
                placeholder="Phone Number"
                required
              />
              <input
                name="whatsAppNumber"
                type="number"
                placeholder="WhatsApp Number"
                required
              />
              <input
                name="email"
                type="email"
                placeholder="Email Address"
                required
              />
              <input
                name="dob"
                type="text"
                placeholder="Birthday (DD/MM)"
                pattern="^(0[1-9]|[12][0-9]|3[01])\/(0[1-9]|1[0-2])$"
                maxlength="5"
                oninput="
                  this.value = this.value.replace(/[^0-9\/]/g, '');
                  if (this.value.length === 2 && !this.value.includes('/')) {
                    this.value += '/';
                  }
                "
                required
              />
              <input
                name="weddingAnniversary"
                type="text"
                placeholder="Wedding Anniversary (DD-MM-YYYY)"
                pattern="\d{2}-\d{2}-\d{4}"
                onfocus="this.type = 'date'"
                onblur="
                  if (!this.value) this.type = 'text';
                  else this.value = formatDate(this.value);
                "
              />
              <select name="community" class="gender__select" required>
                <option value="" disabled selected>Community</option>
                <option value="Community 1">Community 1</option>
                <option value="Community 2">Community 2</option>
                <option value="Community 3">Community 3</option>
                <option value="Community 4">Community 4</option>
                <option value="Integration">Integration</option>
              </select>
              <select name="waterBaptism" class="gender__select" required>
                <option value="" disabled selected>
                  Water Baptism by Emerson
                </option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
              </select>
              <button type="submit" class="sub__btn">Submit</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- ── Beautiful Success Overlay ── -->
    <div id="success-overlay">
      <div class="success-card">
        <!-- Particles -->
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>

        <!-- Icon -->
        <div class="success-icon-wrap">
          <div class="success-ring"></div>
          <div class="success-ring"></div>
          <div class="success-icon">
            <svg viewBox="0 0 24 24">
              <polyline points="20 6 9 17 4 12" />
            </svg>
          </div>
        </div>

        <p class="success-label">Registration Complete</p>
        <h2 class="success-title">Welcome to the Family!</h2>
        <div class="success-divider"></div>
        <p class="success-message">
          You have successfully registered.<br />
          We are glad to have you among the Issachars.
        </p>
        <button class="success-close" onclick="closeSuccess()">Continue</button>
      </div>
    </div>

    <script>
      function showSuccess() {
        const overlay = document.getElementById("success-overlay");
        overlay.classList.add("show");
        // ✅ Auto-redirect after 4 seconds
        setTimeout(() => {
          window.location.href = "/index.html";
        }, 4000);
      }

      function closeSuccess() {
        // ✅ Continue button goes home
        window.location.href = "/index.html";
      }

      // Close on backdrop click → go home
      document
        .getElementById("success-overlay")
        .addEventListener("click", function (e) {
          if (e.target === this) window.location.href = "/index.html";
        });

      document
        .getElementById("registrationForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const formData = new FormData(this);
          const data = Object.fromEntries(formData.entries());

          try {
            const response = await fetch(
              "https://phc-reg-wqfa.vercel.app/phc-form",
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data),
              },
            );

            if (response.ok) {
              this.reset();
              showSuccess(); // ✅ Show beautiful success message
            } else {
              const error = await response.json();
              alert(
                `Submission failed: ${error.message || response.statusText}`,
              );
            }
          } catch (err) {
            alert(`Network error: ${err.message}`);
          }
        });
    </script>
    <script src="../Home/preloader.js"></script>
    <script src="../Home/animation.js"></script>
  </body>
</html>
